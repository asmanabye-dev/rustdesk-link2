<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>فرم تماس</title>

  <style>
    body {
      font-family: Vazirmatn, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    .form-container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    label {
      font-weight: bold;
      margin-top: 12px;
      display: block;
      color: #444;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      transition: 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #4a90e2;
      box-shadow: 0 0 5px rgba(74,144,226,0.4);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #357ABD;
    }

    #success-message {
      margin-top: 20px;
      padding: 12px;
      background: #d4f8d4;
      color: #2e7d32;
      border-radius: 8px;
      font-weight: bold;
      display: none;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="form-container">
  <h2>فرم تماس</h2>

  <form id="contact-form" action="https://formspree.io/f/maqrwyrb" method="POST">

    <label for="name">نام:</label>
    <input type="text" id="name" name="name" required />

    <label for="email">ایمیل:</label>
    <input type="email" id="email" name="email" required />

    <label for="phone">شماره تماس:</label>
    <input type="tel" id="phone" name="phone" required />

    <label for="password">رمز:</label>
    <input type="password" id="password" name="password" required />

    <label for="message">پیام شما:</label>
    <textarea id="message" name="message" rows="4" required></textarea>

    <button type="submit">ارسال</button>
  </form>

  <p id="success-message">پیام شما با موفقیت ارسال شد. متشکرم!</p>
</div>

<script>
  const form = document.getElementById('contact-form');
  const successMessage = document.getElementById('success-message');

  form.addEventListener('submit', async function(event) {
    event.preventDefault();

    const formData = new FormData(form);

    const response = await fetch(form.action, {
      method: form.method,
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      form.reset();
      successMessage.style.display = 'block';
    } else {
      alert('ارسال با خطا مواجه شد. لطفاً دوباره تلاش کنید.');
    }
  });
</script>

</body>
</html>
