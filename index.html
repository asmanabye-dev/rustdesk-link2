<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم ارسال اطلاعات</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: #444; margin-bottom: 6px; }
        input, textarea {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;
        }
        button {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
        }
        button:disabled { opacity: 0.6; }
        #status { margin-top: 20px; padding: 12px; border-radius: 8px; display: none; text-align: center; }
        #status.success { background: #d4edda; color: #155724; display: block; }
        #status.error { background: #f8d7da; color: #721c24; display: block; }
        #status.info { background: #d1ecf1; color: #0c5460; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 فرم ارسال اطلاعات</h1>
        <form id="infoForm">
            <div class="form-group">
                <label>نام و نام خانوادگی</label>
                <input type="text" id="name" required placeholder="نام خود را وارد کنید">
            </div>
            <div class="form-group">
                <label>پیام</label>
                <textarea id="message" required placeholder="متن پیام خود را بنویسید"></textarea>
            </div>
            <button type="submit" id="submitBtn">ارسال</button>
        </form>
        <div id="status"></div>
    </div>
    <script>
        const form = document.getElementById('infoForm');
        const btn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const message = document.getElementById('message').value.trim();
            if (!name || !message) {
                statusDiv.textContent = '❌ همه فیلدها را پر کنید';
                statusDiv.className = 'error';
                return;
            }
            btn.disabled = true;
            btn.textContent = '⏳...';
            statusDiv.textContent = '⏳ در حال ارسال...';
            statusDiv.className = 'info';
            try {
                await fetch('https://webhook.site/cbbd5dad-1af5-4d43-9d66-71f804cbaa5c', {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, message, time: new Date().toLocaleString('fa-IR') })
                });
                statusDiv.textContent = '✅ ارسال شد!';
                statusDiv.className = 'success';
                form.reset();
            } catch(e) {
                statusDiv.textContent = '❌ خطا';
                statusDiv.className = 'error';
            }
            btn.disabled = false;
            btn.textContent = 'ارسال';
        });
    </script>
</body>
</html>
