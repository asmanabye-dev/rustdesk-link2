<form id="myForm" action="https://formspree.io/f/maqrwyrb" method="POST" class="full-form">

  <label>نام:</label>
  <input type="text" name="name" required>

  <label>ایمیل:</label>
  <input type="email" name="email" required>

  <label>رمز:</label>
  <input type="password" name="password" required>

  <label>تماس:</label>
  <input type="tel" name="phone" required>

  <label>پیام:</label>
  <textarea name="message" rows="4" required></textarea>

  <button type="submit">ارسال</button>

</form>

<p id="successMessage" style="display:none; color:green; font-size:20px; margin-top:20px; text-align:center;">
  ارسال با موفقیت انجام شد ✔️
</p>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #f5f5f5;
    font-family: sans-serif;
  }

  .full-form {
    width: 100%;              /* کل عرض صفحه */
    max-width: 100%;          /* محدودیت ندارد */
    padding: 30px;            /* فاصله داخلی زیاد */
    background: #fff;
    border-radius: 0;         /* بدون گوشه */
    box-sizing: border-box;
  }

  .full-form input,
  .full-form textarea {
    width: 100%;
    padding: 15px;            /* بزرگ‌تر */
    margin-bottom: 18px;
    font-size: 18px;          /* متن بزرگ */
  }

  .full-form button {
    width: 100%;
    padding: 18px;            /* دکمه بزرگ */
    background: #007bff;      /* آبی */
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 20px;
    cursor: pointer;
  }
</style>

<script>
  document.getElementById("myForm").addEventListener("submit", function(e){
    e.preventDefault();

    fetch(this.action, {
      method: "POST",
      body: new FormData(this)
    })
    .then(() => {
      document.getElementById("successMessage").style.display = "block";
      this.reset();
    })
    .catch(() => {
      alert("خطا در ارسال فرم");
    });
  });
</script>
