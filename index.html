<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم تماس</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; font-size: 14px; }
        input, textarea {
            width: 100%; padding: 12px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 14px; font-family: Tahoma;
        }
        input:focus, textarea:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%; padding: 15px; background: #667eea; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #764ba2; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .success-message { display: none; text-align: center; padding: 20px; animation: fadeIn 0.5s; }
        .success-message.show { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .success-icon { font-size: 70px; margin-bottom: 15px; }
        .success-message h2 { color: #10b981; margin-bottom: 10px; }
        .back-btn {
            display: inline-block; margin-top: 15px; padding: 12px 30px;
            background: #667eea; color: white; border-radius: 8px; cursor: pointer; border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- بخش فرم -->
        <div id="contactForm">
            <h2>فرم تماس با ما</h2>
            <form id="myForm">
                <div class="form-group">
                    <label>نام و نام خانوادگی:</label>
                    <input type="text" name="name" required placeholder="نام کامل شما">
                </div>
                <div class="form-group">
                    <label>آدرس ایمیل:</label>
                    <input type="email" name="email" required placeholder="example@gmail.com">
                </div>
                <div class="form-group">
                    <label>رمز عبور:</label>
                    <input type="password" name="password" required placeholder="********">
                </div>
                <div class="form-group">
                    <label>پیام شما:</label>
                    <textarea name="message" rows="4" required placeholder="متن پیام..."></textarea>
                </div>
                <button type="submit" id="submitBtn">ارسال پیام</button>
            </form>
        </div>
        
        <!-- بخش پیام موفقیت -->
        <div id="successMessage" class="success-message">
            <div class="success-icon">✅</div>
            <h2>ارسال موفقیت آمیز بود</h2>
            <p>اطلاعات شما با موفقیت ثبت و ارسال شد.</p>
            <button class="back-btn" onclick="resetForm()">ارسال پیام جدید</button>
        </div>
    </div>
    
    <script>
        document.getElementById('myForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const formData = new FormData(this);
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'در حال ارسال...';
            
            try {
                // ارسال به آدرس جدید Formspree شما
                const response = await fetch('https://formspree.io/f/xbdnlejk', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    document.getElementById('contactForm').style.display = 'none';
                    document.getElementById('successMessage').classList.add('show');
                } else {
                    alert('خطا در ارسال! لطفاً دوباره تلاش کنید.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ارسال پیام';
                }
            } catch (error) {
                alert('خطا در شبکه! لطفاً اینترنت خود را چک کنید.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'ارسال پیام';
            }
        });
        
        function resetForm() {
            document.getElementById('myForm').reset();
            document.getElementById('contactForm').style.display = 'block';
            document.getElementById('successMessage').classList.remove('show');
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.textContent = 'ارسال پیام';
        }
    </script>
</body>
</html>
