<form id="myForm" action="https://formspree.io/f/maqrwyrb" method="POST" class="big-form">

  <label>نام:</label>
  <input type="text" name="name" required>

  <label>ایمیل:</label>
  <input type="email" name="email" required>

  <label>رمز:</label>
  <input type="password" name="password" required>

  <label>تماس:</label>
  <input type="tel" name="phone" required>

  <label>پیام:</label>
  <textarea name="message" rows="4" required></textarea>

  <button type="submit">ارسال</button>

</form>

<p id="successMessage" style="display:none; color:green; font-size:18px; margin-top:15px;">
  ارسال با موفقیت انجام شد ✔️
</p>

<style>
  .big-form {
    width: 350px;
    padding: 20px;
    background: #fff;
    border-radius: 10px;
  }

  .big-form input,
  .big-form textarea {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    font-size: 16px;
  }

  .big-form button {
    width: 100%;
    padding: 14px;
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
  }
</style>

<script>
  document.getElementById("myForm").addEventListener("submit", function(e){
    e.preventDefault();

    fetch(this.action, {
      method: "POST",
      body: new FormData(this)
    })
    .then(() => {
      document.getElementById("successMessage").style.display = "block";
      this.reset();
    })
    .catch(() => {
      alert("خطا در ارسال فرم");
    });
  });
</script>
