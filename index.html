<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم تماس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: Tahoma, Arial, sans-serif;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: Tahoma, Arial, sans-serif;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        /* پیام موفقیت */
        .success-message {
            display: none;
            text-align: center;
            padding: 30px;
            animation: fadeIn 0.5s;
        }
        .success-message.show {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .success-message h2 {
            color: #10b981;
            margin-bottom: 15px;
        }
        .success-message p {
            color: #666;
            line-height: 2;
            margin-bottom: 25px;
        }
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }
        .back-btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- فرم -->
        <div id="contactForm">
            <h2>فرم تماس با ما</h2>
            <form id="myForm">
                <div class="form-group">
                    <label for="name">نام و نام خانوادگی:</label>
                    <input type="text" id="name" name="name" required placeholder="نام کامل شما">
                </div>
                
                <div class="form-group">
                    <label for="email">آدرس ایمیل:</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                
                <div class="form-group">
                    <label for="subject">موضوع:</label>
                    <input type="text" id="subject" name="subject" required placeholder="موضوع پیام">
                </div>
                
                <div class="form-group">
                    <label for="message">پیام شما:</label>
                    <textarea id="message" name="message" rows="5" required placeholder="متن پیام شما..."></textarea>
                </div>
                
                <button type="submit" id="submitBtn">ارسال پیام</button>
            </form>
        </div>
        
        <!-- پیام موفقیت -->
        <div id="successMessage" class="success-message">
            <div class="success-icon">✅</div>
            <h2>ارسال موفقیت آمیز بود</h2>
            <p>از اینکه با ما تماس گرفتید متشکریم.<br>
            در اسرع وقت با شما تماس خواهیم گرفت.</p>
            <button class="back-btn" onclick="resetForm()">ارسال پیام جدید</button>
        </div>
    </div>
    
    <script>
        document.getElementById('myForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const formData = new FormData(this);
            
            // تغییر متن دکمه
            submitBtn.disabled = true;
            submitBtn.textContent = 'در حال ارسال...';
            
            try {
                // ارسال به Formspree
                const response = await fetch('https://formspree.io/f/1ed87d35-d26e-4ebb-952a-00024fa8bf38', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    // مخفی کردن فرم و نمایش پیام موفقیت
                    document.getElementById('contactForm').style.display = 'none';
                    document.getElementById('successMessage').classList.add('show');
                } else {
                    alert('خطا در ارسال! لطفاً دوباره تلاش کنید.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ارسال پیام';
                }
            } catch (error) {
                alert('خطا در ارسال! لطفاً دوباره تلاش کنید.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'ارسال پیام';
            }
        });
        
        // بازنشانی فرم
        function resetForm() {
            document.getElementById('myForm').reset();
            document.getElementById('contactForm').style.display = 'block';
            document.getElementById('successMessage').classList.remove('show');
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.textContent = 'ارسال پیام';
        }
    </script>
</body>
</html>
